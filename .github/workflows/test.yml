name: test
on:
  pull_request:
  push:
    branches: [main]

jobs:
  gateway:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: orbi_test
          POSTGRES_USER: orbi
          POSTGRES_PASSWORD: orbi-test-only
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U orbi -d orbi_test"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://orbi:orbi-test-only@localhost:5432/orbi_test
      TEST_REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e '.[dev]'
      - run: ruff check .
      - run: pytest -q
      - run: bandit -c pyproject.toml -r apps/gateway/src apps/node/src
